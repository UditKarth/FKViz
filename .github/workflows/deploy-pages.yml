# Build and deploy the app to GitHub Pages
# Docs: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # User site repo (*.github.io) → base '/' for root URL
          # Project repo (e.g. FKViz) → base './' for username.github.io/repo-name/
          VITE_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || './' }}

      - name: Verify build (must not serve source index)
        run: |
          if grep -q '/src/main.jsx' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.jsx - build failed to replace source entry"
            exit 1
          fi
          echo "Build OK: index.html uses built assets"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment URL
        run: |
          echo "Site should be at: ${{ steps.deployment.outputs.page_url }}"
          echo "If you see MIME/404 for /src/main.jsx, set Settings → Pages → Source to 'GitHub Actions' (not 'Deploy from a branch') and open the URL above."
